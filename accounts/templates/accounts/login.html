{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <title>Login | Medical</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Styles -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <link rel="shortcut icon" href="{% static 'images/fav-icon.png' %}">

    <style>
        .my-width {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-top: 5px;
        }

        .text-color-pink {
            color: #FF004F;
        }

        .button-btn {
            background-color: #FF004F;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
        }

        .button-btn:hover {
            background-color: #e60046;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #FF004F;
        }

        .position-relative {
            position: relative;
        }

        label {
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="login-main-wrapper">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-lg-6 col-md-12 p-0">
                    <div class="form-sidebar">
                        <div class="logo-section">
                            <img src="{% static 'images/logo3.png' %}" alt="logo">
                        </div>
                        <div class="form-image d-xl-block d-lg-block d-none">
                            <img src="{% static 'images/form-img.png' %}" alt="img">
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 col-md-12 p-0">
                    <div class="login-main">
                        <form method="POST" action="{% url 'login' %}">
                            {% csrf_token %}
                            <h4>Login Now</h4>
                            <p class="mb-3">Enter your credentials below</p>

                            {% if messages %}
                            {% for message in messages %}
                            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                            {% endfor %}
                            {% endif %}

                            <label for="email">Email*</label>
                            <input type="email" name="email" class="my-width" required>

                            <label for="password">Password*</label>
                            <div class="position-relative">
                                <input type="password" id="password" name="password" class="my-width" required>
                                <span class="toggle-password" onclick="togglePassword('password', this)">👁</span>
                            </div>

                            <button type="submit" class="button-btn mt-4 text-capitalize">Login
                                <span><i class="fas fa-angle-double-right"></i></span>
                            </button>

                            <p class="mt-2">Don't have an account? <a href="{% url 'register' %}"
                                    class="text-color-pink">Register Now</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="{% static 'js/jquery-3.6.0.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script>
        function togglePassword(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                el.textContent = "🙈";
            } else {
                input.type = "password";
                el.textContent = "👁";
            }
        }
    </script>
</body>

</html>
